services:
  - type: web
    name: healio
    runtime: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: "https://healio.onrender.com"
      - key: MONGODB_URI
        sync: false
      - key: EDAMAM_APP_ID
        sync: false
      - key: EDAMAM_APP_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
